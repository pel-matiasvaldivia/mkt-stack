name: deploy

# Despliegue por SSH al VPS que ya corre Nginx Proxy Manager.
# Footprint minimo: se validan y sincronizan solo los archivos del stack, se
# hace `docker compose pull` de las imagenes pineadas (alpine/slim) y se
# limpian las capas colgadas al final. El .env con los secretos vive EN EL
# SERVIDOR (generado con scripts/gen-secrets.sh), nunca en el repo ni en CI.

on:
  push:
    branches: [main]
    paths:
      - "docker-compose.yml"
      - ".env.example"
      - "postgres/**"
      - "clickhouse/**"
      - "scripts/**"
      - "Makefile"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  validate:
    name: Validar compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: docker compose config
        run: |
          cp .env.example .env
          docker compose config -q
          echo "compose valido"

  deploy:
    name: Deploy al VPS
    needs: validate
    runs-on: ubuntu-latest
    # Requiere configurar un Environment "production" con estos secrets:
    #   SSH_HOST, SSH_USER, SSH_KEY, SSH_PORT (opcional), DEPLOY_PATH
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Sincronizar archivos del stack al servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "docker-compose.yml,Makefile,postgres,clickhouse,scripts,.env.example"
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Pull minimo + deploy + limpieza
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            if [ ! -f .env ]; then
              echo "ERROR: falta .env en el servidor. Genera los secretos con ./scripts/gen-secrets.sh antes del primer deploy." >&2
              exit 1
            fi
            docker compose pull --quiet
            docker compose up -d --remove-orphans
            docker image prune -f
            docker compose ps
